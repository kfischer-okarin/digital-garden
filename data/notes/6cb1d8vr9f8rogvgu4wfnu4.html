<h1 id="dump-a-database"><a aria-hidden="true" class="anchor-heading icon-link" href="#dump-a-database"></a>Dump a database</h1>
<pre class="language-sh"><code class="language-sh">mysqldump -h db.url.com -p -u user databasename > dump.sql
</code></pre>
<h2 id="explation"><a aria-hidden="true" class="anchor-heading icon-link" href="#explation"></a>Explation</h2>
<ul>
<li><code>-p</code> will prompt for a password</li>
<li>Automatically adds drop table statements by default</li>
</ul>
